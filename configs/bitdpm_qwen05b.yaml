# BitDPM Configuration for Qwen2.5-0.5B-Instruct
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  device: ""  # auto-detect
  dtype: "float16"
  attn_implementation: "sdpa"

quantization:
  enabled: false
  method: ""  # "int4", "int8"
  load_in_4bit: false
  load_in_8bit: false

blocks:
  target_modules:
    - "o_proj"
    - "down_proj"
  default_rank: 8
  default_scale: 1.0
  num_blocks: 3
  block_types:
    - name: "general"
      description: "General QA knowledge"
      layers: "last3"  # last 3 layers
    - name: "math"
      description: "Math and calculation"
      layers: "last3"
    - name: "code"
      description: "Code understanding and generation"
      layers: "last3"

router:
  type: "simple_keyword"  # "simple_keyword", "entropy"
  entropy_threshold: 0.5
  max_blocks: 3

training:
  lr: 1e-3
  epochs: 3
  batch_size: 2
  max_length: 64

eval:
  max_tokens: 128
  temperature: 0.1
  num_runs: 3
  warmup_runs: 1
